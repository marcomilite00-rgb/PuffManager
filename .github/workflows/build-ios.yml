name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Project
        run: npm run build

      - name: Sync / Add Capacitor iOS
        run: |
          if [ ! -d "ios" ]; then
            echo "La cartella ios non esiste. Inizializzazione della piattaforma iOS..."
            npx cap add ios
          else
            echo "Sincronizzazione della piattaforma iOS..."
            npx cap sync ios
          fi

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
                     -project ios/App/App.xcodeproj \
                     -scheme App

      - name: Start iOS Simulator (Workaround for ibtool hang)
        run: |
          xcrun simctl boot "iPhone 15" || true

      # Questa fase compila il progetto Xcode. 
      # Usiamo -derivedDataPath per specificare esattamente dove salvare i file compilati.
      # Usiamo -project anziché -workspace poiché SPM non crea workspace.
      - name: Build Xcode Project
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath ios/App/build \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     clean build > xcodebuild.log 2>&1 || (tail -n 200 xcodebuild.log && exit 1)

      # Pacchettizziamo l'app compilata (.app) in un archivio zip
      - name: Archive Build
        run: |
          mkdir -p build-output
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app build-output/
          cd build-output
          zip -r PuffManager.app.zip App.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build-output/PuffManager.app.zip

