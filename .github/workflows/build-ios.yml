name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor iOS
        run: |
          npx cap sync ios

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
                     -workspace ios/App/App.xcworkspace \
                     -scheme App

      # Questa fase compila il progetto Xcode. 
      # Usiamo -derivedDataPath per specificare esattamente dove salvare i file compilati.
      - name: Build Xcode Project
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath ios/App/build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      # Pacchettizziamo l'app compilata (.app) in un archivio zip
      - name: Archive Build
        run: |
          mkdir -p build-output
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app build-output/
          cd build-output
          zip -r PuffManager.app.zip App.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build-output/PuffManager.app.zip

