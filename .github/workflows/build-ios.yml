name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor iOS
        run: |
          npx cap json
          npx cap sync ios

      # Questa fase compila il progetto Xcode. 
      # Nota: Per generare un .ipa installabile su dispositivi fisici non registrati,
      # è solitamente necessario configurare i certificati di firma Apple (iOS Provisioning Profiles).
      # Qui compiliamo l'app in modalità release senza firma automatica per generare il pacchetto Xcode.
      - name: Build Xcode Project
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      # Opzionale: Se si vuole pacchettizzare l'app compilata in un archivio zip / app
      - name: Archive Build
        run: |
          mkdir -p build-output
          cp -r ios/App/build/Release-iphoneos/App.app build-output/
          cd build-output
          zip -r PuffManager.app.zip App.app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build-output/PuffManager.app.zip
